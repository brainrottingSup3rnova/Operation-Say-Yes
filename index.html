<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Operation: Say Yes</title>
</head>

<body>
    <div class="container">
        <h1 id="questionDisplayer">Would you like to go on a date with me?</h1>
        <div id="firstStep">
            <div class="d-flex justify-content-center mt-4">
                <button id="yesBtn" class="btn btn-success me-5">Yes!!</button>
                <button id="noBtn" class="btn btn-danger">No..</button>
            </div>
        </div>
        <div id="secondStep" class="d-none mt-4">
            <form>
                <div class="row g-3 mb-2 selection-grid">
                    <div class="col-6">
                        <div id="cinemaOption" class="card h-100 text-center p-3 selection-box cp border-2">
                            <img src="assets/pixel_cinema.png" alt="Cinema Icon" class="mx-auto mb-2 option-icon"
                                style="height: 60px; object-fit: contain;">
                            <strong>Cinema</strong>
                        </div>
                    </div>
                    <div class="col-6">
                        <div id="picnicOption" class="card h-100 text-center p-3 selection-box cp border-2">
                            <img src="assets/pixel_picnic.png" alt="Picnic Icon" class="mx-auto mb-2 option-icon"
                                style="height: 60px; object-fit: contain;">
                            <strong>Picnic</strong>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-4 selection-grid">
                    <div class="col-6">
                        <div id="sushiOption" class="card h-100 text-center p-3 selection-box cp border-2">
                            <img src="assets/pixel_sushi.png" alt="Sushi Icon" class="mx-auto mb-2 option-icon"
                                style="height: 60px; object-fit: contain;">
                            <strong>Sushi</strong>
                        </div>
                    </div>
                    <div class="col-6">
                        <div id="nvmOption" class="card h-100 text-center p-3 selection-box cp border-2">
                            <img src="assets/pixel_cross.png" alt="Cross Icon" class="mx-auto mb-2 option-icon"
                                style="height: 60px; object-fit: contain;">
                            <strong>Nvm...</strong>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <div class="character-container">
        <img src="assets/pixel_girl.png" alt="Pixel Girl" class="character-img">
        <div class="speech-bubble" id="speechBubble">
            Hii! I wanted to ask you something...
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
