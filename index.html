<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Operation: Say Yes</title>
</head>

<body>
    <div class="container">
        <h1>Would you like to go on a date with me?</h1>
        <div class="d-flex justify-content-center mt-4">
            <button id="yesBtn" class="btn btn-success me-5">Yes!!</button>
            <button id="noBtn" class="btn btn-danger">No..</button>
        </div>
    </div>
    <div class="character-container">
        <img src="assets/pixel_girl.png" alt="Pixel Girl" class="character-img">
        <div class="speech-bubble" id="speechBubble">
            Hii! I wanted to ask you something...
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
